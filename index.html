<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-Commerce</title>

  <!-- ⚡ PERFORMANCE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🚀 PRECONNECT -->
  <link rel="preconnect" href="https://fakestoreapi.com">
  <link rel="preconnect" href="https://images.unsplash.com">

  <!-- 🎨 CSS -->
  <link rel="stylesheet" href="styles/main.css">

</head>

<body>

<header class="header">
  <div class="logo">🛒 MyStore</div>

  <nav class="nav">
    <a href="#">Home</a>
    <a href="#">Products</a>
  </nav>

  <div>
    <span id="userName"></span>
    <a href="auth.html" id="loginBtn">Login</a>
    <button onclick="logout()" id="logoutBtn">Logout</button>

    <a href="cart.html" class="cart">
      🛍️ <span class="badge">0</span>
    </a>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Biggest Sale 🔥</h1>
    <p>Up to 50% OFF</p>
    <button onclick="scrollToProducts()">Shop Now</button>
  </div>
</section>

<main>
  <h2>Our Products</h2>
  <div id="productList" class="products"></div>
</main>

<script src="scripts/app.js" defer></script>
</body>
</html>
